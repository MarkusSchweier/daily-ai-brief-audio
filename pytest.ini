[pytest]
# Scopes repo-root `pytest` runs to the top-level audio_email.py fan-out tests only.
#
# deploy/subscribers/ is a separate CDK sub-project with its own dependency set
# (aws-cdk-lib, etc.) and its own pytest.ini (testpaths = tests) — run its tests from
# within that directory using its own virtualenv, per deploy/subscribers/README.md.
# Running both suites together from repo root is not supported: both trees carry a
# same-named tests/conftest.py, which collide under pytest's default rootdir-based
# import when collected in a single session.
testpaths = tests
