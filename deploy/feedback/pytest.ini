[pytest]
# Scopes `pytest` runs from within deploy/feedback/ to this sub-project's own tests,
# mirroring deploy/subscribers/pytest.ini and deploy/managed-agent/pytest.ini: each
# deploy/ sub-project is a separate dependency set with its own tests/conftest.py, and
# same-named conftest.py files across trees collide under pytest's default
# rootdir-based import if collected together. Run this suite from within
# deploy/feedback/.
testpaths = tests
